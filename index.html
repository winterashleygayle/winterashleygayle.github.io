
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ashley Winter Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      color: #333;
    }
    header {
      text-align: center;
      padding: 50px 20px;
      background-color: #222;
      color: white;
    }
    header h1 {
      font-size: 2.5em;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .gallery img {
      width: 100%;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    footer {
      text-align: center;
      padding: 20px;
      background-color: #222;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Ashley Winter Photography</h1>
    <p>Capturing life, one frame at a time.</p>
  </header>
  <section class="gallery">
    <img src="moon1.jpeg" alt="A beautiful Moon">
    <img src="crow.jpeg" alt="crows feet">
    <img src="moon.jpeg" alt="moon shot"> 
  </section>
  <footer>
    <p>&copy; 2025 Ashley Winter Photography</p>
  </footer>
</body>
</html>
