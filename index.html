<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography Portfolio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Static Background -->
  <div class="background"></div>

  <!-- Main Content -->
  <div class="content">
    <!-- Navigation -->
    <header>
      <div class="nav-left">
        <a href="#about" class="nav-item name">Your Name</a>
        <a href="#portfolio" class="nav-item">Portfolio</a>
        <a href="#contact" class="nav-item">Contact</a>
      </div>
    </header>

    <!-- About Section -->
    <section id="about" class="about-section">
      <h1>About Me</h1>
      <p>Welcome! I’m a passionate photographer, videographer, and artist, capturing moments that tell unique stories. Explore my portfolio to discover my work.</p>
    </section>

    <!-- Photo Grid Section -->
    <section id="portfolio" class="photo-grid-section">
      <h1>Portfolio</h1>
      <div class="photo-grid">
        <div class="photo" style="grid-column: span 2;"><img src="photo1.jpg" alt="Photo 1"></div>
        <div class="photo"><img src="photo2.jpg" alt="Photo 2"></div>
        <div class="photo"><img src="photo3.jpg" alt="Photo 3"></div>
        <div class="photo" style="grid-row: span 2;"><img src="photo4.jpg" alt="Photo 4"></div>
        <div class="photo"><img src="photo5.jpg" alt="Photo 5"></div>
        <div class="photo" style="grid-column: span 2; grid-row: span 2;"><img src="photo6.jpg" alt="Photo 6"></div>
      </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="contact-section">
      <h1>Contact Me</h1>
      <p>Interested in working together? Feel free to reach out!</p>
      <a href="mailto:your.email@example.com" class="button">Email Me</a>
    </section>
  </div>
</body>
</html>
